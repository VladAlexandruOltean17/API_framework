[pytest]

testpaths = tests
python_files = test_*.py
markers =
    posts: The test cases related to posts
    users: Test cases related to users
    consistency: Users-Posts-Comments relationship
    albums: The test cases related to albums

log_cli = true
log_cli_level = INFO


# Added this to make sure last running logs are always
# added in the last_run log file and it overwrites them
log_file = C:\Users\voltean\PycharmProjects\ETA25Advanced-Ex2\logs\last_run.log
log_file_mode = w
log_file_level = DEBUG
log_file_format = %(asctime)s | %(levelname)s | %(message)s | %(name)s
log_file_date_format = %Y-%m-%d %H:%M:%S